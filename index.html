<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김비서를 소개합니다</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: rgba(255, 255, 255, 0.7);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-tertiary: #999999;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.15);
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-bg: linear-gradient(135deg, #f5f7ff 0%, #faf8ff 50%, #f0f4ff 100%);
        }

        html.dark {
            --bg-primary: #0f0f23;
            --bg-secondary: rgba(20, 20, 40, 0.8);
            --bg-tertiary: rgba(255, 255, 255, 0.05);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --gradient-bg: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', sans-serif;
            background: var(--gradient-bg);
            background-attachment: fixed;
            color: var(--text-primary);
            padding: 60px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease;
        }

        .header-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--bg-secondary);
            box-shadow: var(--shadow-md);
            transform: scale(1.05);
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .card {
            background: var(--bg-tertiary);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
        }

        .card:hover {
            backdrop-filter: blur(25px);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        h1 {
            font-size: 48px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .intro {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 50px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }

        .feature-box {
            background: var(--bg-tertiary);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .feature-box:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
        }

        .feature-box h3 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .feature-box p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .btn-dashboard {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            padding: 16px 48px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-dashboard:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.6);
        }

        .btn-dashboard:active {
            transform: translateY(-1px);
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 25px;
            }

            h1 {
                font-size: 36px;
            }

            .intro {
                font-size: 16px;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .header-bar {
                top: 15px;
                right: 15px;
            }

            .theme-toggle {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <button class="theme-toggle" id="themeToggle" title="테마 변경">☀️</button>
    </div>

    <div class="container">
        <div class="card">
            <h1>김비서를 소개합니다</h1>

            <p class="intro">
                업무 관리의 모든 것을 한눈에.<br>
                효율적인 일정 관리와 프로젝트 추적으로 생산성을 극대화하세요.
            </p>

            <div class="features">
                <div class="feature-box">
                    <h3>📋 업무 관리</h3>
                    <p>우선순위별 할 일 정리 및 진행 상황 추적</p>
                </div>
                <div class="feature-box">
                    <h3>📅 일정 관리</h3>
                    <p>주간 스케줄 한눈에 보기 및 미팅 시간 확인</p>
                </div>
                <div class="feature-box">
                    <h3>📊 성과 분석</h3>
                    <p>프로젝트 진행률과 매출 현황 실시간 확인</p>
                </div>
            </div>

            <a href="dashboard.html" class="btn-dashboard">내 대시보드 보기</a>
        </div>
    </div>

    <script>
        // 다크 모드 토글
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // 저장된 테마 복원
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.classList.toggle('dark', savedTheme === 'dark');
        updateThemeToggle();

        themeToggle.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeToggle();
        });

        function updateThemeToggle() {
            const isDark = html.classList.contains('dark');
            themeToggle.textContent = isDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>

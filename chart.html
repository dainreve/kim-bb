<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출 분석 차트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: rgba(255, 255, 255, 0.7);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-tertiary: #999999;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.15);
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-bg: linear-gradient(135deg, #f5f7ff 0%, #faf8ff 50%, #f0f4ff 100%);
            --color-blue: #3b82f6;
            --color-blue-light: #60a5fa;
            --color-green: #10b981;
            --color-green-light: #34d399;
            --color-cyan: #06b6d4;
            --color-teal: #14b8a6;
        }

        html.dark {
            --bg-primary: #0f0f23;
            --bg-secondary: rgba(20, 20, 40, 0.8);
            --bg-tertiary: rgba(255, 255, 255, 0.05);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --gradient-bg: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', sans-serif;
            background: var(--gradient-bg);
            background-attachment: fixed;
            color: var(--text-primary);
            padding: 30px 20px;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .header-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--bg-secondary);
            box-shadow: var(--shadow-md);
            transform: scale(1.05);
        }

        /* 네비게이션 메뉴 */
        .nav-menu {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            gap: 0;
            background: var(--bg-tertiary);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 16px 20px;
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
            border-bottom: 3px solid transparent;
        }

        .nav-item:last-child {
            border-right: none;
        }

        .nav-item:hover {
            background: rgba(102, 126, 234, 0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border-bottom-color: #667eea;
            color: var(--text-primary);
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .nav-menu {
                gap: 8px;
                padding: 8px;
            }

            .nav-item {
                flex: 1;
                padding: 12px 12px;
                border-right: none;
                border-radius: 8px;
                border-bottom: none;
                font-size: 12px;
                background: var(--bg-secondary);
            }

            .nav-item.active {
                background: var(--gradient-primary);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--bg-secondary);
            box-shadow: var(--shadow-sm);
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .card {
            background: var(--bg-tertiary);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '▸';
            color: var(--color-blue);
            font-size: 24px;
        }

        .chart-container {
            width: 100%;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100%;
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .stat-item {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-blue);
        }

        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 24px;
            }

            .card {
                padding: 20px;
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 15px;
            }

            .page-title {
                font-size: 20px;
            }

            .card-title {
                font-size: 16px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-item {
                padding: 12px;
            }

            .stat-value {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <button class="theme-toggle" id="themeToggle" title="테마 변경">☀️</button>
    </div>

    <!-- 네비게이션 메뉴 -->
    <div class="nav-menu" id="navMenu">
        <a href="dashboard.html" class="nav-item" data-page="dashboard.html">📊 대시보드</a>
        <a href="meeting-result.html" class="nav-item" data-page="meeting-result.html">📋 회의록</a>
        <a href="chart.html" class="nav-item active" data-page="chart.html">📈 매출 현황</a>
        <a href="process.html" class="nav-item" data-page="process.html">🔄 업무 프로세스</a>

    <div class="container">
        <a href="dashboard.html" class="back-link">← 대시보드로</a>

        <h1 class="page-title">매출 분석 대시보드</h1>
        <p class="page-subtitle">월별 추이와 제품별 성과 분석</p>

        <div class="charts-grid">
            <!-- 월별 매출 추이 -->
            <div class="card">
                <h2 class="card-title">월별 매출 추이</h2>

                    <canvas id="monthlyChart" width="900" height="400"></canvas>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">1월 매출</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-label">2월 매출</div>
                        <div class="stat-value" id="feb-sales">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">총 매출</div>
                        <div class="stat-value" id="total-sales">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">거래 건수</div>
                        <div class="stat-value" id="transaction-count">0</div>
                    </div>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #3b82f6;"></div>
                        <span>선 그래프: 누적 매출액</span>
                    </div>
                </div>
            </div>

            <!-- 제품별 매출 비교 -->
            <div class="card">
                <h2 class="card-title">제품별 매출 비교</h2>
                <div class="chart-container">
                    <canvas id="productChart" width="900" height="400"></canvas>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">최고 매출 제품</div>
                        <div class="stat-value" id="top-product">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">제품 종류</div>
                        <div class="stat-value" id="product-count">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">최고/최저 비율</div>
                        <div class="stat-value" id="ratio">0%</div>
                    </div>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #3b82f6;"></div>
                        <span>무선 이어폰</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #10b981;"></div>
                        <span>보조배터리</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #06b6d4;"></div>
                        <span>텀블러</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #14b8a6;"></div>
                        <span>블루투스 스피커</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #8b5cf6;"></div>
                        <span>무선 충전기</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #f59e0b;"></div>
                        <span>에코백</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 다크 모드 토글
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'light';
        html.classList.toggle('dark', savedTheme === 'dark');
        updateThemeToggle();

        themeToggle.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeToggle();
            redrawCharts();
        });

        function updateThemeToggle() {
            const isDark = html.classList.contains('dark');
            themeToggle.textContent = isDark ? '🌙' : '☀️';
        }

        // 숫자에 쉼표 추가
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // 색상 가져오기
        function getColor(name) {
            const colors = {
                text: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim(),
                textSecondary: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim(),
                border: getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim(),
                blue: getComputedStyle(document.documentElement).getPropertyValue('--color-blue').trim(),
                green: getComputedStyle(document.documentElement).getPropertyValue('--color-green').trim(),
                cyan: getComputedStyle(document.documentElement).getPropertyValue('--color-cyan').trim(),
                teal: getComputedStyle(document.documentElement).getPropertyValue('--color-teal').trim(),
            };
            return colors[name] || '#000';
        }

        // 매출 데이터
        const salesData = [
            { date: '2026-01-05', product: '무선 이어폰', sales: 4005000 },
            { date: '2026-01-05', product: '보조배터리', sales: 1120000 },
            { date: '2026-01-05', product: '텀블러', sales: 1950000 },
            { date: '2026-01-08', product: '무선 이어폰', sales: 4628000 },
            { date: '2026-01-08', product: '블루투스 스피커', sales: 2160000 },
            { date: '2026-01-08', product: '텀블러', sales: 1625000 },
            { date: '2026-01-12', product: '보조배터리', sales: 1435000 },
            { date: '2026-01-12', product: '무선 충전기', sales: 1305000 },
            { date: '2026-01-12', product: '에코백', sales: 1395000 },
            { date: '2026-01-15', product: '무선 이어폰', sales: 3382000 },
            { date: '2026-01-15', product: '블루투스 스피커', sales: 2640000 },
            { date: '2026-01-15', product: '텀블러', sales: 2100000 },
            { date: '2026-01-19', product: '보조배터리', sales: 1925000 },
            { date: '2026-01-19', product: '에코백', sales: 1650000 },
            { date: '2026-01-19', product: '무선 충전기', sales: 1485000 },
            { date: '2026-01-22', product: '무선 이어폰', sales: 5429000 },
            { date: '2026-01-22', product: '텀블러', sales: 1800000 },
            { date: '2026-01-22', product: '블루투스 스피커', sales: 1800000 },
            { date: '2026-01-26', product: '보조배터리', sales: 1680000 },
            { date: '2026-01-26', product: '에코백', sales: 1320000 },
            { date: '2026-01-26', product: '무선 충전기', sales: 1665000 },
            { date: '2026-02-01', product: '무선 이어폰', sales: 6230000 },
            { date: '2026-02-01', product: '텀블러', sales: 2375000 },
            { date: '2026-02-01', product: '보조배터리', sales: 1505000 },
            { date: '2026-02-05', product: '블루투스 스피커', sales: 3000000 },
            { date: '2026-02-05', product: '에코백', sales: 1800000 },
            { date: '2026-02-05', product: '무선 충전기', sales: 1395000 },
            { date: '2026-02-10', product: '무선 이어폰', sales: 5162000 },
            { date: '2026-02-10', product: '텀블러', sales: 1675000 },
            { date: '2026-02-10', product: '보조배터리', sales: 1365000 }
        ];

        // 월별 데이터 계산
        function calculateMonthlyData() {
            const monthly = {
                '1월': 0,
                '2월': 0
            };

            salesData.forEach(item => {
                const month = item.date.substring(5, 7) === '01' ? '1월' : '2월';
                monthly[month] += item.sales;
            });

            return monthly;
        }

        // 제품별 데이터 계산
        function calculateProductData() {
            const products = {};
            salesData.forEach(item => {
                if (!products[item.product]) {
                    products[item.product] = 0;
                }
                products[item.product] += item.sales;
            });
            return products;
        }

        // 월별 차트 그리기
        function drawMonthlyChart() {
            const canvas = document.getElementById('monthlyChart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            canvas.width = 900 * dpr;
            canvas.height = 400 * dpr;
            ctx.scale(dpr, dpr);

            const monthly = calculateMonthlyData();
            const months = Object.keys(monthly);
            const values = Object.values(monthly);
            const maxValue = Math.max(...values);

            const padding = 60;
            const chartWidth = 900 - 2 * padding;
            const chartHeight = 400 - 2 * padding;

            const textColor = getColor('text');
            const textSecondaryColor = getColor('textSecondary');
            const borderColor = getColor('border');
            const blueColor = '#3b82f6';

            // 배경
            ctx.fillStyle = 'transparent';
            ctx.fillRect(0, 0, 900, 400);

            // 축 그리기
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, 400 - padding);
            ctx.lineTo(900 - padding, 400 - padding);
            ctx.stroke();

            // 그리드 라인
            ctx.strokeStyle = borderColor;
            ctx.globalAlpha = 0.3;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (chartHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(900 - padding, y);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Y축 레이블
            ctx.fillStyle = textSecondaryColor;
            ctx.font = '12px -apple-system, BlinkMacSystemFont';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const value = Math.round((maxValue / 5) * i / 1000000) * 1000000;
                const y = 400 - padding - (chartHeight / 5) * i;
                ctx.fillText(formatNumber(value / 1000000) + '백만', padding - 10, y + 4);
            }

            // 선 그래프 그리기
            ctx.strokeStyle = blueColor;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();

            months.forEach((month, index) => {
                const x = padding + (chartWidth / (months.length - 1)) * index;
                const y = 400 - padding - (values[index] / maxValue) * chartHeight;
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.stroke();

            // 데이터 포인트
            ctx.fillStyle = blueColor;
            months.forEach((month, index) => {
                const x = padding + (chartWidth / (months.length - 1)) * index;
                const y = 400 - padding - (values[index] / maxValue) * chartHeight;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();

                // 값 표시
                ctx.fillStyle = textColor;
                ctx.font = 'bold 14px -apple-system, BlinkMacSystemFont';
                ctx.textAlign = 'center';
                ctx.fillText(formatNumber(Math.round(values[index] / 1000000)) + '백만', x, y - 20);
            });

            // X축 레이블
            ctx.fillStyle = textSecondaryColor;
            ctx.font = '12px -apple-system, BlinkMacSystemFont';
            months.forEach((month, index) => {
                const x = padding + (chartWidth / (months.length - 1)) * index;
                ctx.textAlign = 'center';
                ctx.fillText(month, x, 400 - padding + 25);
            });

            // 통계 업데이트
            document.getElementById('jan-sales').textContent = formatNumber(Math.round(monthly['1월'] / 1000000)) + '백만';
            document.getElementById('feb-sales').textContent = formatNumber(Math.round(monthly['2월'] / 1000000)) + '백만';
            document.getElementById('total-sales').textContent = formatNumber(Math.round((monthly['1월'] + monthly['2월']) / 1000000)) + '백만';
            document.getElementById('transaction-count').textContent = salesData.length;
        }

        // 제품별 차트 그리기
        function drawProductChart() {
            const canvas = document.getElementById('productChart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            canvas.width = 900 * dpr;
            canvas.height = 400 * dpr;
            ctx.scale(dpr, dpr);

            const products = calculateProductData();
            const productNames = Object.keys(products).sort((a, b) => products[b] - products[a]);
            const values = productNames.map(name => products[name]);
            const maxValue = Math.max(...values);

            const colors = ['#3b82f6', '#10b981', '#06b6d4', '#14b8a6', '#8b5cf6', '#f59e0b'];

            const padding = 60;
            const chartWidth = 900 - 2 * padding;
            const chartHeight = 400 - 2 * padding;
            const barWidth = chartWidth / (productNames.length * 1.5);

            const textColor = getColor('text');
            const textSecondaryColor = getColor('textSecondary');
            const borderColor = getColor('border');

            // 배경
            ctx.fillStyle = 'transparent';
            ctx.fillRect(0, 0, 900, 400);

            // 축 그리기
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, 400 - padding);
            ctx.lineTo(900 - padding, 400 - padding);
            ctx.stroke();

            // 그리드 라인
            ctx.strokeStyle = borderColor;
            ctx.globalAlpha = 0.3;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (chartHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(900 - padding, y);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Y축 레이블
            ctx.fillStyle = textSecondaryColor;
            ctx.font = '12px -apple-system, BlinkMacSystemFont';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const value = Math.round((maxValue / 5) * i / 1000000) * 1000000;
                const y = 400 - padding - (chartHeight / 5) * i;
                ctx.fillText(formatNumber(value / 1000000) + '백만', padding - 10, y + 4);
            }

            // 막대 그리기
            productNames.forEach((product, index) => {
                const x = padding + (chartWidth / productNames.length) * index + (chartWidth / productNames.length - barWidth) / 2;
                const barHeight = (values[index] / maxValue) * chartHeight;
                const y = 400 - padding - barHeight;

                // 막대
                ctx.fillStyle = colors[index % colors.length];
                ctx.fillRect(x, y, barWidth, barHeight);

                // 값 표시
                ctx.fillStyle = textColor;
                ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont';
                ctx.textAlign = 'center';
                ctx.fillText(formatNumber(Math.round(values[index] / 1000000)) + '백만', x + barWidth / 2, y - 8);

                // X축 레이블
                ctx.fillStyle = textSecondaryColor;
                ctx.font = '11px -apple-system, BlinkMacSystemFont';
                ctx.textAlign = 'center';
                const productLabel = product.length > 8 ? product.substring(0, 7) + '...' : product;
                ctx.fillText(productLabel, x + barWidth / 2, 400 - padding + 25);
            });

            // 통계 업데이트
            const maxProduct = productNames[0];
            const minProduct = productNames[productNames.length - 1];
            const ratio = Math.round((products[maxProduct] / products[minProduct]) * 100);

            document.getElementById('top-product').textContent = maxProduct;
            document.getElementById('product-count').textContent = productNames.length;
            document.getElementById('ratio').textContent = formatNumber(ratio) + '%';
        }

        function redrawCharts() {
            drawMonthlyChart();
            drawProductChart();
        }

        // 초기 로드
        window.addEventListener('load', redrawCharts);
        window.addEventListener('resize', redrawCharts);

        // 네비게이션 메뉴 활성화
        function activateNavItem() {
            const currentPage = window.location.pathname.split('/').pop() || 'chart.html';
            const navItems = document.querySelectorAll('.nav-item');

            navItems.forEach(item => {
                const itemPage = item.getAttribute('data-page');
                if (itemPage === currentPage || (currentPage === '' && itemPage === 'chart.html')) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        window.addEventListener('load', activateNavItem);
        document.addEventListener('DOMContentLoaded', activateNavItem);
    </script>
</body>
</html>
